{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Cormorant:ital,wght@0,300..700;1,300..700&family=GFS+Didot&family=Instrument+Serif:ital@0;1&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'home/css/style.css' %}">

<section>

    <!-- Show all Car -->
    {% for car in cars %}
        <article class="car-availability">
            <img src="{{ car.photo.url }}" width="300">
            <h3> {{ car.brand }} {{ car.model }} </h3>
            <p> {{ car.preview }} </p>
            <p> Stock: {{ car.stock }} </p>
            <p> Estado: {{ car.availability }} </p>
            <p> Precio: {{ car.price }} </p>
            <a href="{% url 'car:car_detail' car.pk %}" class="detail-car"> VER DETALLES </a>
        </article>
    {% endfor %}

</section>
